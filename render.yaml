services:
  # Backend API (Node.js + Express)
  - type: web
    name: purveyols-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set in Render dashboard; never commit credentials
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard; never commit secrets
      - key: CORS_ORIGIN
        sync: false   # Set in Render dashboard to your Netlify/Vercel frontend URL
